# Скопируйте в keys.yml и заполните. Файл keys.yml не коммитится в git.

telegram:
  bot_token: ""      # Токен от @BotFather
  chat_id: ""        # ID чата для уведомлений (число или строка)

mexc:
  api_key: ""        # Опционально, для сканера не нужен
  secret_key: ""     # Опционально

# БД: при require_redis: true в settings.yml нужен Redis (рекомендуется для продакшна).
# При use_redis true и redis_url localhost:6379 бот при старте сам попытается поднять Redis в Docker.
db:
  use_redis: true
  redis_url: "redis://localhost:6379/0"
  sqlite_path: "data/scanner.db"
