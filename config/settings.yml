# Настройки сканера (без секретов). Можно менять в любой момент.

scanner:
  # true = только Redis (антидубли main + PRE-ALERT через SETNX). В keys.yml: use_redis: true и redis_url.
  require_redis: true
  # PRE-ALERT при RSI >= этого значения и < rsi_threshold_4h (один раз на свечу)
  rsi_prealert_min: 85.0
  # RSI всегда считается с периодом 24 (RSI3 на графике MEXC); rsi_period из конфига не используется
  rsi_period: 24
  # Пороги для разных таймфреймов
  rsi_threshold_4h: 90.0   # 4H: сигнал только если RSI3(24) >= 90 (по открытой свече)
  min_alert_delay_4h_sec: 60   # Не слать в первые N сек свечи 4H (чтобы RSI совпадал с графиком MEXC)
  # Больше свечей → длиннее цепочка Wilder, ближе к RSI на графике MEXC (у них полная история)
  kline_history_count: 60
  kline_batch: 3           # Параллельных запросов (MEXC лимит ~10/с; больше — 510)
  kline_delay: 0.35        # Секунд паузы между запросами истории
  ws_ping_interval: 15     # Секунды между ping по WebSocket

  # --- Продакшн v5 (auto-healing / zero duplicate) ---
  ws_stall_timeout_sec: 15               # Нет WS-сообщений N сек → reconnect
  ws_reconnect_backoff_sec: [5, 10, 20, 60]
  backup_rsi_interval_sec: 8              # Период REST-подстраховки «застывших» символов
  backup_stale_symbol_sec: 25            # Символ без WS дольше N сек → подтянуть kline по REST
  backup_rest_concurrency: 3
  backup_batch_size: 80                  # Макс. символов за один цикл backup
  watchdog_interval_sec: 10
  watchdog_warn_after_sec: 25             # Лог ERROR если нет WS-трафика (stall сам переподключит)
  heartbeat_interval_sec: 60
  heartbeat_file: "/tmp/mexc_scanner_heartbeat"   # Для Docker healthcheck
  time_sync_interval_sec: 300             # Сверка времени с MEXC REST
  rest_circuit_fail_threshold: 8          # Ошибок REST за окно → пауза
  rest_circuit_window_sec: 60
  rest_circuit_open_sec: 45
  log_dir: "logs"
  log_file_max_mb: 10
  log_file_backup_count: 5
  telegram_send_retries: 3
  telegram_retry_base_delay_sec: 1.5

mexc:
  rest_base: "https://api.mexc.com"
  ws_url: "wss://contract.mexc.com/edge"
  kline_interval: "Min60"  # Базовый интервал 1H; для 4H в коде используется Hour4
